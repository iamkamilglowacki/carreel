<!DOCTYPE html>
<html lang="pl" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CarReel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/style.css?v=4" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: "#3b82f6", dark: "#1e40af" },
          },
        },
      },
    };
  </script>
</head>
<body class="h-full bg-[#0f172a] text-slate-200 antialiased" x-data="reelApp">

  <!-- Header -->
  <header class="border-b border-slate-800 bg-[#0f172a]/80 backdrop-blur sticky top-0 z-30">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <h1 class="text-xl font-bold tracking-tight">
        <span class="text-blue-400">Car</span><span class="text-slate-100">Reel</span>
        <span class="text-slate-500 font-normal text-sm ml-1">AI</span>
      </h1>
      <div class="flex items-center gap-3">
        <span class="text-xs text-slate-500 hidden sm:inline" x-text="t('header.subtitle')"></span>
        <!-- Language switcher -->
        <div class="flex rounded-md overflow-hidden border border-slate-600">
          <button
            @click="switchLang('pl')"
            class="px-2.5 py-1 text-[12px] leading-none transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 flex items-center gap-1.5"
            :class="lang === 'pl' ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'"
          ><span class="text-[14px]">&#127477;&#127473;</span> PL</button>
          <button
            @click="switchLang('en')"
            class="px-2.5 py-1 text-[12px] leading-none transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 flex items-center gap-1.5"
            :class="lang === 'en' ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'"
          ><span class="text-[14px]">&#127468;&#127463;</span> EN</button>
          <button
            @click="switchLang('de')"
            class="px-2.5 py-1 text-[12px] leading-none transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 flex items-center gap-1.5"
            :class="lang === 'de' ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'"
          ><span class="text-[14px]">&#127465;&#127466;</span> DE</button>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8 space-y-8">

    <!-- ===== New Reel — Tabbed Section ===== -->
    <section class="bg-slate-800/50 border border-slate-700 rounded-xl p-6">

      <!-- Tab switcher -->
      <div class="flex rounded-lg overflow-hidden border border-slate-600 mb-6">
        <button
          @click="createTab = 'url'"
          class="flex-1 px-4 py-2.5 text-sm font-medium transition-colors focus:outline-none flex items-center justify-center gap-2"
          :class="createTab === 'url' ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
          </svg>
          <span x-text="t('tabs.fromUrl')"></span>
        </button>
        <button
          @click="createTab = 'manual'"
          class="flex-1 px-4 py-2.5 text-sm font-medium transition-colors focus:outline-none flex items-center justify-center gap-2"
          :class="createTab === 'manual' ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
          <span x-text="t('tabs.fromMedia')"></span>
        </button>
      </div>

      <!-- ===== TAB: From URL ===== -->
      <div x-show="createTab === 'url'" x-cloak>
        <p class="text-sm text-slate-400 mb-4" x-text="t('otomoto.subtitle')"></p>

        <div class="flex flex-col sm:flex-row gap-3">
          <input
            type="url"
            x-model="otomotoUrl"
            :placeholder="t('otomoto.placeholder')"
            class="flex-1 bg-slate-900 border border-slate-600 rounded-lg px-4 py-2.5 text-sm text-slate-200 placeholder-slate-500 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/40"
          />
          <button
            @click="importOtomoto()"
            :disabled="otomotoLoading"
            class="px-5 py-2.5 bg-orange-600 hover:bg-orange-500 disabled:bg-slate-600 disabled:cursor-not-allowed text-white font-medium rounded-lg transition-colors whitespace-nowrap focus:outline-none focus:ring-2 focus:ring-orange-500 focus:ring-offset-2 focus:ring-offset-slate-900"
          >
            <span x-show="!otomotoLoading" x-text="t('otomoto.import')"></span>
            <span x-show="otomotoLoading" class="flex items-center gap-2">
              <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
              </svg>
              <span x-text="t('otomoto.loading')"></span>
            </span>
          </button>
        </div>

        <!-- Error -->
        <div x-show="otomotoError" x-cloak class="mt-3 px-4 py-2 bg-red-900/40 border border-red-800 rounded-lg text-sm text-red-300" role="alert" x-text="otomotoError"></div>

        <!-- Otomoto preview card -->
        <template x-if="otomotoListing">
          <div class="mt-4 p-4 bg-slate-900/60 border border-slate-700/50 rounded-lg">
            <div class="flex items-start justify-between gap-4 mb-3">
              <div>
                <h3 class="text-base font-semibold text-slate-200" x-text="otomotoListing.title"></h3>
                <p class="text-lg font-bold text-emerald-400 mt-1">
                  <span x-text="Number(otomotoListing.price).toLocaleString('pl-PL')"></span>
                  <span class="text-sm font-normal text-slate-400" x-text="otomotoListing.currency"></span>
                </p>
              </div>
            </div>
            <div class="flex flex-wrap gap-2 mb-3">
              <template x-for="tag in [otomotoListing.year, otomotoListing.mileage, otomotoListing.fuel_type, otomotoListing.engine_power, otomotoListing.gearbox, otomotoListing.color].filter(Boolean)">
                <span class="px-2 py-0.5 bg-slate-700 rounded text-xs text-slate-300" x-text="tag"></span>
              </template>
            </div>
            <p class="text-xs text-slate-500 mb-3">
              <span x-text="otomotoListing.photo_urls.length"></span> <span x-text="t('otomoto.photos')"></span>
              <span class="mx-1">&middot;</span>
              <span x-text="otomotoListing.location"></span>
            </p>
            <!-- Photo preview -->
            <div class="flex gap-2 overflow-x-auto pb-2 mb-4" x-show="otomotoListing.photo_urls.length > 0">
              <template x-for="(url, idx) in otomotoListing.photo_urls.slice(0, 6)" :key="idx">
                <img :src="url" :alt="otomotoListing.title" class="h-20 w-auto rounded-md object-cover flex-shrink-0 border border-slate-600" />
              </template>
              <div x-show="otomotoListing.photo_urls.length > 6" class="h-20 w-20 rounded-md bg-slate-700 flex items-center justify-center flex-shrink-0 text-sm text-slate-400">
                +<span x-text="otomotoListing.photo_urls.length - 6"></span>
              </div>
            </div>
            <button
              @click="generateFromOtomoto()"
              :disabled="otomotoGenerating"
              class="w-full md:w-auto px-6 py-2.5 bg-blue-600 hover:bg-blue-500 disabled:bg-slate-600 disabled:cursor-not-allowed text-white font-medium rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-slate-900"
            >
              <span x-show="!otomotoGenerating" x-text="t('otomoto.generate')"></span>
              <span x-show="otomotoGenerating" class="flex items-center gap-2">
                <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
                <span x-text="t('otomoto.generating')"></span>
              </span>
            </button>
          </div>
        </template>

        <!-- Generated sales copy preview -->
        <div x-show="otomotoSalesCopy" x-cloak class="mt-4 bg-emerald-900/20 border border-emerald-700/40 rounded-lg p-5">
          <h3 class="text-sm font-semibold text-emerald-400 uppercase tracking-wide mb-2" x-text="t('otomoto.salesCopyTitle')"></h3>
          <p class="text-sm text-slate-300 leading-relaxed whitespace-pre-line" x-text="otomotoSalesCopy"></p>
        </div>
      </div>

      <!-- ===== TAB: From Media ===== -->
      <div x-show="createTab === 'manual'" x-cloak>

      <!-- 1. Car description (text + optional voice memo) -->
      <div class="mb-5">
        <label class="block text-sm text-slate-400 mb-2" x-text="t('upload.carDescription')"></label>
        <textarea
          x-model="typedTranscript"
          :placeholder="t('upload.typePlaceholder')"
          class="w-full h-28 bg-slate-900 border border-slate-600 rounded-lg p-3 text-sm text-slate-200 placeholder-slate-500 resize-none focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/40"
        ></textarea>

        <!-- Clean up text button -->
        <div class="mt-2 flex items-center gap-3">
          <button
            x-show="typedTranscript.trim().length > 0 && !cleaningUp"
            @click="cleanUpText()"
            class="inline-flex items-center gap-2 px-4 py-2 rounded-full text-sm font-medium transition-colors select-none bg-slate-700 hover:bg-slate-600 text-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-slate-900"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
            </svg>
            <span x-text="t('upload.cleanUp')"></span>
          </button>
          <span x-show="cleaningUp" class="flex items-center gap-2 text-xs text-blue-400">
            <svg class="animate-spin h-3.5 w-3.5" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            <span x-text="t('upload.cleaningUp')"></span>
          </span>
        </div>

        <!-- Voice memo -->
        <div class="mt-2 flex items-center gap-3">
          <button
            x-show="!isRecording"
            @click="startRecording()"
            aria-label="Start recording"
            class="inline-flex items-center gap-2 px-4 py-2 rounded-full text-sm font-medium transition-colors select-none bg-slate-700 hover:bg-slate-600 text-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-slate-900"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4M12 15a3 3 0 003-3V5a3 3 0 00-6 0v7a3 3 0 003 3z" />
            </svg>
            <span x-text="t('upload.startRecord')"></span>
          </button>
          <button
            x-show="isRecording"
            @click="stopAndTranscribe()"
            aria-label="Stop recording"
            class="inline-flex items-center gap-2 px-4 py-2 rounded-full text-sm font-medium transition-colors select-none bg-red-600 text-white hover:bg-red-500 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 focus:ring-offset-slate-900"
          >
            <span class="recording-dot w-2.5 h-2.5 rounded-full bg-white inline-block"></span>
            <span x-text="t('upload.stopRecord')"></span>
          </button>
          <span x-show="transcribing" class="flex items-center gap-2 text-xs text-blue-400">
            <svg class="animate-spin h-3.5 w-3.5" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            <span x-text="t('upload.transcribing')"></span>
          </span>
          <span x-show="!isRecording && !transcribing && recordedBlob" class="text-xs text-emerald-400" x-text="t('upload.transcribed')"></span>
          <span x-show="!isRecording && !transcribing && !recordedBlob" class="text-xs text-slate-500" x-text="t('upload.voiceHint')"></span>
        </div>
      </div>

      <!-- 2. Media files -->
      <div class="mb-5">
        <label class="block text-sm text-slate-400 mb-2" x-text="t('upload.mediaLabel')"></label>
        <div
          class="drop-zone border-2 border-dashed border-slate-600 rounded-lg p-6 text-center cursor-pointer hover:border-slate-500 focus-within:border-blue-500 focus-within:ring-2 focus-within:ring-blue-500/40"
          @dragover.prevent="onDragOver($event, $el)"
          @dragleave="onDragLeave($event, $el)"
          @drop="onDropMedia($event)"
          @click="$refs.mediaInput.click()"
        >
          <svg class="w-8 h-8 mx-auto mb-2 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
          <p class="text-sm text-slate-400" x-text="mediaFiles.length > 0 ? mediaFiles.length + ' ' + t('upload.mediaSelected') : t('upload.mediaDrop')"></p>
        </div>
        <input id="media-input" x-ref="mediaInput" type="file" accept="image/*,video/*" multiple class="hidden"
          @change="addMediaFiles($event.target.files)" />

        <!-- File list -->
        <template x-if="mediaFiles.length > 0">
          <ul class="mt-2 space-y-1">
            <template x-for="(file, idx) in mediaFiles" :key="idx">
              <li class="flex items-center justify-between gap-2 px-3 py-1.5 bg-slate-900/60 border border-slate-700/50 rounded-lg text-sm">
                <div class="flex items-center gap-2 min-w-0">
                  <svg class="w-4 h-4 flex-shrink-0 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                  </svg>
                  <span class="truncate text-slate-300" x-text="file.name"></span>
                  <span class="flex-shrink-0 text-xs text-slate-500" x-text="(file.size / 1024 / 1024).toFixed(1) + ' MB'"></span>
                </div>
                <button @click="removeMediaFile(idx)" class="flex-shrink-0 text-slate-500 hover:text-red-400 transition-colors focus:outline-none focus:text-red-400" aria-label="Remove file">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                  </svg>
                </button>
              </li>
            </template>
          </ul>
        </template>
      </div>

      <!-- Error -->
      <div x-show="uploadError" x-cloak class="mb-3 px-4 py-2 bg-red-900/40 border border-red-800 rounded-lg text-sm text-red-300" role="alert" x-text="uploadError"></div>

      <!-- Submit -->
      <button
        @click="upload()"
        :disabled="uploading"
        class="w-full md:w-auto px-6 py-2.5 bg-blue-600 hover:bg-blue-500 disabled:bg-slate-600 disabled:cursor-not-allowed text-white font-medium rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-slate-900"
      >
        <span x-show="!uploading" x-text="t('upload.generateReel')"></span>
        <span x-show="uploading" class="flex items-center gap-2">
          <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          <span x-text="t('upload.uploading') + ' ' + uploadProgress + '%'"></span>
        </span>
      </button>
      <!-- Upload progress bar -->
      <div x-show="uploading" class="w-full mt-2 bg-slate-700 rounded-full h-2 overflow-hidden" role="progressbar" :aria-valuenow="uploadProgress" aria-valuemin="0" aria-valuemax="100">
        <div class="bg-blue-500 h-2 rounded-full transition-all duration-300" :style="'width: ' + uploadProgress + '%'"></div>
      </div>
      </div><!-- /TAB: From Media -->

    </section>

    <!-- ===== Job Detail (selected job) ===== -->
    <section x-show="selectedJob" x-cloak class="bg-slate-800/50 border border-slate-700 rounded-xl p-6">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-lg font-semibold">
          <span x-text="t('job.title')"></span> <span class="text-blue-400 font-mono text-sm" x-text="selectedJob?.job_id"></span>
        </h2>
        <button @click="closeJob()" class="text-slate-400 hover:text-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 rounded px-2 py-1" x-text="t('job.close')"></button>
      </div>

      <!-- Status badge -->
      <div class="mb-6">
        <span class="inline-block px-3 py-1 rounded-full text-xs font-medium uppercase tracking-wide text-white"
          :class="statusColor(selectedJob?.status)"
          x-text="selectedJob?.status"></span>
        <span x-show="selectedJob?.error" class="ml-2 text-sm text-red-400" x-text="selectedJob?.error"></span>
      </div>

      <!-- Pipeline steps -->
      <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-3 mb-6" aria-live="polite">
        <template x-for="s in steps" :key="s.key">
          <div class="step-indicator flex flex-col items-center gap-2 p-3 rounded-lg bg-slate-900/50 border border-slate-700/50"
            :class="{ 'border-blue-500/40 bg-blue-950/20': s.status === 'active', 'border-emerald-500/30': s.status === 'completed', 'border-red-500/30': s.status === 'failed' }">
            <svg class="w-6 h-6" :class="stepColorClass(s.status)" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" :d="stepIcon(s.status)" />
            </svg>
            <span class="text-xs font-medium" :class="stepColorClass(s.status)" x-text="s.label"></span>
            <!-- Progress bar -->
            <div x-show="s.status === 'active'" class="w-full h-1.5 bg-slate-700 rounded-full overflow-hidden mt-1">
              <div x-show="s.progress > 0" class="h-full bg-blue-500 rounded-full transition-all duration-300 ease-out" :style="'width: ' + (s.progress || 0) + '%'"></div>
              <div x-show="!s.progress || s.progress === 0" class="h-full bg-blue-500 rounded-full progress-indeterminate"></div>
            </div>
            <span x-show="s.status === 'active' && s.progress > 0" class="text-[10px] text-blue-400" x-text="s.progress + '%'"></span>
          </div>
        </template>
      </div>

      <!-- Video player in iPhone 16 Pro frame -->
      <div x-show="selectedJob?.status === 'completed' && selectedJob?.has_final_video" x-cloak>
        <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wide mb-3" x-text="t('job.preview')"></h3>

        <!-- iPhone mockup: PNG frame overlay on video -->
        <div class="relative mx-auto w-[300px]">
          <!-- Video behind the frame — inset to fit the screen area -->
          <div class="absolute top-[1.6%] left-[3.8%] right-[3.8%] bottom-[1.6%] rounded-[28px] overflow-hidden bg-black z-0">
            <video
              x-ref="reelVideo"
              class="w-full h-full object-cover pointer-events-none"
              :src="selectedJob?.has_final_video ? '/api/jobs/' + selectedJob.job_id + '/output' : ''"
              playsinline
              loop
              muted
            ></video>

            <!-- iOS Status Bar -->
            <div class="absolute top-0 inset-x-0 z-30 flex items-center justify-between px-5 pt-2 h-[36px] pointer-events-none">
              <span class="text-white text-[11px] font-semibold" style="font-family:-apple-system,BlinkMacSystemFont,sans-serif">9:41</span>
              <div class="flex items-center gap-1">
                <svg width="14" height="10" viewBox="0 0 16 11" fill="white"><rect x="0" y="8" width="3" height="3" rx="0.5"/><rect x="4" y="5.5" width="3" height="5.5" rx="0.5"/><rect x="8" y="3" width="3" height="8" rx="0.5"/><rect x="12" y="0" width="3" height="11" rx="0.5"/></svg>
                <svg width="13" height="10" viewBox="0 0 24 18" fill="none" stroke="white" stroke-width="2.5"><path d="M1 6a15 15 0 0122 0" stroke-linecap="round"/><path d="M5 10.5a9 9 0 0114 0" stroke-linecap="round"/><path d="M9.5 15a4 4 0 015 0" stroke-linecap="round"/></svg>
                <svg width="20" height="9" viewBox="0 0 27 12" fill="none"><rect x="0.5" y="0.5" width="22" height="11" rx="2" stroke="white" stroke-width="1"/><rect x="2" y="2" width="18" height="8" rx="1" fill="white"/><path d="M24 4v4a2 2 0 000-4z" fill="white" opacity="0.4"/></svg>
              </div>
            </div>

            <!-- IG Overlay — top -->
            <div class="absolute top-0 inset-x-0 z-20 pt-[42px] px-3 pb-2 bg-gradient-to-b from-black/50 to-transparent pointer-events-none flex items-center justify-between">
              <span class="text-white text-[15px] font-bold" style="font-family:-apple-system,BlinkMacSystemFont,sans-serif">Reels</span>
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="13" r="4"/></svg>
            </div>

            <!-- IG Overlay — right actions -->
            <div class="absolute right-3 bottom-[141px] z-20 flex flex-col items-center gap-4 pointer-events-none">
              <!-- Heart / Like -->
              <div class="flex flex-col items-center gap-0.5">
                <svg class="w-6 h-6 drop-shadow" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.6"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
                <span class="text-white text-[10px] font-semibold drop-shadow">2,847</span>
              </div>
              <!-- Comment -->
              <div class="flex flex-col items-center gap-0.5">
                <svg class="w-6 h-6 drop-shadow" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.6"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                <span class="text-white text-[10px] font-semibold drop-shadow">184</span>
              </div>
              <!-- Share (paper plane) -->
              <div class="flex flex-col items-center gap-0.5">
                <svg class="w-6 h-6 drop-shadow" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.6"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
              </div>
              <!-- Remix / Repost -->
              <svg class="w-6 h-6 drop-shadow" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.6"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
            </div>

            <!-- IG Overlay — bottom info -->
            <div class="absolute bottom-[38px] inset-x-0 z-20 px-3 pt-10 pb-3 pointer-events-none" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
              <!-- Profile row -->
              <div class="flex items-center gap-2 mb-1.5">
                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-yellow-400 via-red-500 to-purple-600 p-[2px] shrink-0">
                  <div class="w-full h-full rounded-full bg-gray-800 border-[1.5px] border-black"></div>
                </div>
                <span class="text-white text-[13px] font-bold drop-shadow">your_dealership</span>
                <span class="text-white text-[12px] font-semibold border border-white/70 rounded-md px-2.5 py-0.5 ml-1">Follow</span>
                <!-- Three dots -->
                <svg class="w-5 h-5 drop-shadow ml-auto mr-1" viewBox="0 0 24 24" fill="white"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
              </div>
              <!-- Description -->
              <p class="text-white text-[13px] leading-snug drop-shadow mb-2 pr-12">Check out this beauty! DM for details</p>
              <!-- Audio row -->
              <div class="flex items-center gap-2 pr-12">
                <svg class="w-3 h-3 shrink-0" viewBox="0 0 24 24" fill="white"><path d="M9 18V5l12-2v13M9 18a3 3 0 11-6 0 3 3 0 016 0zm12-2a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                <span class="text-white text-[11px] drop-shadow truncate">Original Audio - your_dealership</span>
              </div>
            </div>

            <!-- IG Audio disc — bottom right -->
            <div class="absolute right-3 bottom-[46px] z-20 pointer-events-none">
              <div class="w-6 h-6 rounded-md border-[1.5px] border-white/50 bg-gradient-to-br from-purple-600 via-red-500 to-yellow-500 flex items-center justify-center ig-spin overflow-hidden">
                <div class="w-2.5 h-2.5 rounded-full bg-gray-900/60"></div>
              </div>
            </div>

            <!-- IG Bottom Nav -->
            <div class="absolute bottom-0 inset-x-0 z-20 bg-black/90 flex items-center justify-around px-4 pt-1.5 pb-2.5 pointer-events-none">
              <!-- Home -->
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="0.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M9 22V12h6v10" fill="black"/></svg>
              <!-- Reels (play) -->
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8"><rect x="2" y="2" width="20" height="20" rx="3"/><path d="M10 8l6 4-6 4z" fill="white"/></svg>
              <!-- Create / DM -->
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
              <!-- Search -->
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
              <!-- Profile -->
              <div class="w-5 h-5 rounded-full bg-gray-400 border-[1.5px] border-white"></div>
            </div>
            <!-- Home indicator bar -->
            <div class="absolute bottom-1 left-1/2 -translate-x-1/2 w-[100px] h-[4px] rounded-full bg-white/50 z-30"></div>

          </div>

          <!-- PNG frame on top — covers bezels perfectly -->
          <img src="/iphone-frame.png" class="relative z-10 w-full h-auto pointer-events-none select-none" draggable="false" alt="" />
          <!-- Clickable layer above frame for play/pause -->
          <div class="absolute top-[1.6%] left-[3.8%] right-[3.8%] bottom-[1.6%] z-20 cursor-pointer rounded-[28px]" @click="toggleReelPlay($refs.reelVideo)"></div>

          <!-- Play/pause indicator — centered on entire phone -->
          <div x-show="reelPaused" x-transition.opacity class="absolute inset-0 z-30 flex items-center justify-center pointer-events-none">
            <div class="w-16 h-16 rounded-full bg-black/50 flex items-center justify-center backdrop-blur-sm">
              <svg class="w-8 h-8 ml-1" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
            </div>
          </div>
        </div><!-- /iPhone mockup -->

        <!-- Download & WhatsApp buttons -->
        <div class="mt-6 flex flex-col items-center gap-3">
          <a
            :href="'/api/jobs/' + selectedJob?.job_id + '/output'"
            download
            class="inline-flex items-center gap-2 px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-medium rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2 focus:ring-offset-slate-900"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            <span x-text="t('job.downloadMp4')"></span>
          </a>
          <!-- WhatsApp button — localhost only -->
          <button
            x-show="isLocal && otomotoPhoneNumber"
            @click="openWhatsApp()"
            class="inline-flex items-center gap-2 px-5 py-2.5 bg-[#25D366] hover:bg-[#20bd5a] text-white text-sm font-medium rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 focus:ring-offset-slate-900"
          >
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
            <span x-text="t('job.sendWhatsApp')"></span>
          </button>
        </div>
      </div>
    </section>

    <!-- ===== Jobs List ===== -->
    <section>
      <h2 class="text-lg font-semibold mb-4" x-text="t('jobs.title')"></h2>

      <div x-show="jobs.length === 0" class="text-slate-500 text-sm py-8 text-center" x-text="t('jobs.empty')">
      </div>

      <div class="space-y-3">
        <template x-for="job in jobs" :key="job.job_id">
          <div class="job-card bg-slate-800/50 border border-slate-700 rounded-lg p-4 flex items-center justify-between hover:bg-slate-800/80 transition-colors">
            <div class="flex items-center gap-4 cursor-pointer flex-1 min-w-0" @click="selectJob(job.job_id)">
              <span class="inline-block w-2 h-2 rounded-full flex-shrink-0"
                :class="statusColor(job.status)"></span>
              <div class="min-w-0">
                <p class="font-mono text-sm text-slate-300 truncate" x-text="job.job_id"></p>
                <p class="text-xs text-slate-500">
                  <span x-text="job.media_count"></span> <span x-text="t('jobs.files')"></span>
                  <span class="mx-1">&middot;</span>
                  <span x-text="formatDate(job.created_at)"></span>
                </p>
              </div>
            </div>
            <div class="flex items-center gap-3 flex-shrink-0">
              <span class="px-2 py-0.5 rounded text-xs font-medium uppercase"
                :class="statusColor(job.status)"
                x-text="job.status"></span>
              <button @click.stop="deleteJob(job.job_id)" class="text-slate-500 hover:text-red-400 transition-colors focus:outline-none focus:text-red-400" aria-label="Delete job">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
              </button>
            </div>
          </div>
        </template>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="max-w-6xl mx-auto px-4 py-6 mt-8 border-t border-slate-800 text-center text-xs text-slate-600" x-text="t('footer.text')">
  </footer>

  <script src="/i18n.js?v=4"></script>
  <script src="/app.js?v=4"></script>
</body>
</html>
