<!DOCTYPE html>
<html lang="pl" class="h-full">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6WNYCP9VE8"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-6WNYCP9VE8');
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>CarReel - Comparator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/i18n.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/style.css?v=5" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: "#3b82f6", dark: "#1e40af" },
          },
        },
      },
    };
  </script>
</head>
<body class="h-full bg-slate-900 text-slate-100 font-sans antialiased">

<div x-data="comparatorApp()" class="min-h-full flex flex-col">

  <!-- Header -->
  <header class="bg-slate-800/80 backdrop-blur-sm border-b border-slate-700 sticky top-0 z-10">
    <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="/pl" class="p-1.5 -ml-1.5 rounded-lg text-slate-400 hover:text-slate-200 hover:bg-slate-700/50 transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
          </svg>
        </a>
        <div>
          <h1 class="text-base font-bold tracking-tight flex items-center gap-2">
            <svg class="w-5 h-5 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
            </svg>
            <span x-text="t('comparator.title')"></span>
          </h1>
        </div>
      </div>
      <div class="flex gap-1 bg-slate-800 rounded-lg p-0.5 border border-slate-700">
        <template x-for="lg in ['pl','en','de']" :key="lg">
          <button
            @click="setLang(lg)"
            class="px-2.5 py-1 text-xs font-semibold rounded-md transition-all"
            :class="lang === lg ? 'bg-blue-600 text-white shadow-sm' : 'text-slate-400 hover:text-slate-200'"
            x-text="lg.toUpperCase()"
          ></button>
        </template>
      </div>
    </div>
  </header>

  <!-- Main content -->
  <main class="flex-1 px-4 py-8">
    <div class="max-w-2xl mx-auto">

      <!-- Input section -->
      <div class="bg-slate-800/50 border border-slate-700 rounded-xl p-5 mb-6">
        <p class="text-sm text-slate-400 mb-4" x-text="t('comparator.subtitle')"></p>
        <div class="flex flex-col sm:flex-row gap-3">
          <input
            type="url"
            x-model="comparatorUrl"
            @keydown.enter="comparatorFetch()"
            :placeholder="t('comparator.placeholder')"
            class="flex-1 bg-slate-900 border border-slate-600 rounded-lg px-4 py-2.5 text-base text-slate-200 placeholder-slate-500 focus:border-orange-500 focus:outline-none focus:ring-2 focus:ring-orange-500/40 transition-colors"
          />
          <button
            @click="comparatorFetch()"
            :disabled="comparatorLoading"
            class="px-6 py-2.5 bg-orange-600 hover:bg-orange-500 disabled:bg-slate-600 disabled:cursor-not-allowed text-white font-semibold rounded-lg transition-all whitespace-nowrap focus:outline-none focus:ring-2 focus:ring-orange-500 focus:ring-offset-2 focus:ring-offset-slate-900 active:scale-[0.98]"
          >
            <span x-show="!comparatorLoading" x-text="t('comparator.fetch')"></span>
            <span x-show="comparatorLoading" class="flex items-center gap-2">
              <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
              </svg>
              <span x-text="t('comparator.loading')"></span>
            </span>
          </button>
        </div>
      </div>

      <!-- Error -->
      <div x-show="comparatorError" x-cloak x-transition class="mb-6 px-4 py-3 bg-red-900/30 border border-red-800/50 rounded-xl text-sm text-red-300 flex items-center gap-2" role="alert">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span x-text="comparatorError"></span>
      </div>

      <!-- Listing preview card -->
      <template x-if="comparatorListing">
        <div class="bg-slate-800/50 border border-slate-700 rounded-xl overflow-hidden" x-transition>

          <!-- Car title & price header -->
          <div class="px-5 pt-5 pb-4 border-b border-slate-700/50">
            <h3 class="text-lg font-bold text-slate-100" x-text="comparatorListing.title"></h3>
            <p class="text-2xl font-bold text-emerald-400 mt-1">
              <span x-text="Number(comparatorListing.price).toLocaleString('pl-PL')"></span>
              <span class="text-base font-normal text-slate-400" x-text="comparatorListing.currency"></span>
            </p>
          </div>

          <!-- Specs grid -->
          <div class="px-5 py-4 border-b border-slate-700/50">
            <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
              <template x-for="spec in [
                {icon: 'M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z', val: comparatorListing.year},
                {icon: 'M13 7h8m0 0v8m0-8l-8 8-4-4-6 6', val: comparatorListing.mileage},
                {icon: 'M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z', val: comparatorListing.fuel_type},
                {icon: 'M13 10V3L4 14h7v7l9-11h-7z', val: comparatorListing.engine_power},
                {icon: 'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z M15 12a3 3 0 11-6 0 3 3 0 016 0z', val: comparatorListing.gearbox},
                {icon: 'M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01', val: comparatorListing.color},
              ].filter(s => s.val)" :key="spec.val">
                <div class="flex items-center gap-2 bg-slate-900/50 rounded-lg px-3 py-2">
                  <svg class="w-3.5 h-3.5 text-slate-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" :d="spec.icon" />
                  </svg>
                  <span class="text-sm text-slate-300 truncate" x-text="spec.val"></span>
                </div>
              </template>
            </div>
          </div>

          <!-- Location -->
          <div class="px-5 py-3 border-b border-slate-700/50 flex items-center gap-2" x-show="comparatorListing.location">
            <svg class="w-3.5 h-3.5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <span class="text-xs text-slate-400" x-text="comparatorListing.location"></span>
          </div>

          <!-- Action button -->
          <div class="px-5 py-4">
            <button
              x-show="buildOtomotoUrl()"
              @click="window.open(buildOtomotoUrl(), '_blank')"
              class="w-full inline-flex items-center justify-center gap-2.5 px-6 py-3 bg-orange-600 hover:bg-orange-500 text-white font-semibold rounded-lg transition-all focus:outline-none focus:ring-2 focus:ring-orange-500 focus:ring-offset-2 focus:ring-offset-slate-900 active:scale-[0.98] shadow-lg shadow-orange-900/20"
            >
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
              </svg>
              <span x-text="t('comparator.searchOtomoto')"></span>
              <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
              </svg>
            </button>
          </div>
        </div>
      </template>

    </div>
  </main>

</div>

<script>
function comparatorApp() {
  const savedLang = localStorage.getItem("lang") || "pl";

  return {
    lang: savedLang,
    comparatorUrl: "",
    comparatorLoading: false,
    comparatorError: "",
    comparatorListing: null,

    t(key) {
      return (translations?.[this.lang]?.[key]) || (translations?.pl?.[key]) || key;
    },

    setLang(lg) {
      this.lang = lg;
      localStorage.setItem("lang", lg);
    },

    _extractUrl(text) {
      const match = text.match(/https?:\/\/\S+/);
      return match ? match[0] : text;
    },

    async comparatorFetch() {
      const url = this._extractUrl(this.comparatorUrl.trim());
      if (!url || !url.includes("mobile.de")) {
        this.comparatorError = this.t("comparator.errorUrl");
        return;
      }
      this.comparatorLoading = true;
      this.comparatorError = "";
      this.comparatorListing = null;

      try {
        const res = await fetch("/api/scrape-mobile", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url, lang: "de" }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || this.t("comparator.errorScrape"));
        }
        this.comparatorListing = await res.json();
      } catch (e) {
        this.comparatorError = e.message;
      } finally {
        this.comparatorLoading = false;
      }
    },

    buildOtomotoUrl() {
      const l = this.comparatorListing;
      if (!l || !l.make) return null;

      const makeMap = {
        "Abarth": "abarth", "Alfa Romeo": "alfa-romeo", "Audi": "audi",
        "BMW": "bmw", "Chevrolet": "chevrolet", "Chrysler": "chrysler",
        "Citroën": "citroen", "Cupra": "cupra", "Dacia": "dacia",
        "DS": "ds-automobiles", "Dodge": "dodge", "Fiat": "fiat",
        "Ford": "ford", "Honda": "honda", "Hyundai": "hyundai",
        "Infiniti": "infiniti", "Jaguar": "jaguar", "Jeep": "jeep",
        "Kia": "kia", "Lancia": "lancia", "Land Rover": "land-rover",
        "Lexus": "lexus", "Maserati": "maserati", "Mazda": "mazda",
        "Mercedes-Benz": "mercedes-benz", "MINI": "mini", "Mitsubishi": "mitsubishi",
        "Nissan": "nissan", "Opel": "opel", "Peugeot": "peugeot",
        "Porsche": "porsche", "Renault": "renault", "Seat": "seat",
        "Škoda": "skoda", "Skoda": "skoda", "Smart": "smart",
        "Subaru": "subaru", "Suzuki": "suzuki", "Tesla": "tesla",
        "Toyota": "toyota", "Volkswagen": "volkswagen", "Volvo": "volvo",
      };

      const modelMap = {
        "1er": "seria-1", "2er": "seria-2", "3er": "seria-3", "4er": "seria-4",
        "5er": "seria-5", "6er": "seria-6", "7er": "seria-7", "8er": "seria-8",
        "X1": "x1", "X2": "x2", "X3": "x3", "X4": "x4", "X5": "x5", "X6": "x6", "X7": "x7",
        "Z4": "z4", "i3": "i3", "i4": "i4", "i5": "i5", "i7": "i7", "iX": "ix", "iX3": "ix3",
        "A-Klasse": "klasa-a", "B-Klasse": "klasa-b", "C-Klasse": "klasa-c",
        "E-Klasse": "klasa-e", "S-Klasse": "klasa-s", "G-Klasse": "klasa-g",
        "V-Klasse": "klasa-v", "CLA": "cla-klasa", "CLS": "cls-klasa", "GLA": "gla-klasa",
        "GLB": "glb-klasa", "GLC": "glc-klasa", "GLE": "gle-klasa", "GLS": "gls-klasa", "AMG GT": "amg-gt",
        "EQA": "eqa", "EQB": "eqb", "EQC": "eqc", "EQE": "eqe", "EQS": "eqs",
        "A1": "a1", "A3": "a3", "A4": "a4", "A5": "a5", "A6": "a6", "A7": "a7", "A8": "a8",
        "Q2": "q2", "Q3": "q3", "Q4 e-tron": "q4-e-tron", "Q5": "q5", "Q7": "q7", "Q8": "q8",
        "e-tron": "e-tron", "e-tron GT": "e-tron-gt", "TT": "tt", "R8": "r8",
        "Golf": "golf", "Passat": "passat", "Polo": "polo", "Tiguan": "tiguan",
        "T-Roc": "t-roc", "T-Cross": "t-cross", "Touareg": "touareg",
        "Touran": "touran", "Arteon": "arteon", "ID.3": "id.3", "ID.4": "id.4", "ID.5": "id.5",
        "Caddy": "caddy", "Multivan": "multivan", "Transporter": "transporter",
      };

      const fuelMap = {
        "Benzin": "petrol", "Diesel": "diesel", "Elektro": "electric",
        "Hybrid (Benzin/Elektro)": "hybrid", "Hybrid (Diesel/Elektro)": "hybrid",
        "Plug-in-Hybrid": "hybrid", "Erdgas (CNG)": "cng", "Autogas (LPG)": "petrol-lpg",
        "Wasserstoff": "hydrogen",
      };

      const bodyTypeMap = {
        "Kombi": "combi", "Limousine": "sedan", "Cabrio/Roadster": "kabriolet",
        "Sportwagen/Coupé": "coupe", "Geländewagen/Pickup": "suv",
        "Van/Kleinbus": "van", "Kleinwagen": "hatchback", "Kompaktklasse": "kompakt",
        "SUV/Geländewagen": "suv", "SUV/Geländewagen/Pickup": "suv",
        "Shooting Brake": "combi",
      };

      const makeSlug = makeMap[l.make] || l.make.toLowerCase().replace(/\s+/g, "-");
      const modelSlug = modelMap[l.model] ||
        (() => {
          const key = Object.keys(modelMap).find(k => l.model.startsWith(k + " ") || l.model === k);
          return key ? modelMap[key] : l.model.toLowerCase().replace(/\s+/g, "-");
        })();

      let bodySlug = bodyTypeMap[l.body_type] || "";
      if (!bodySlug) {
        const titleLower = (l.title + " " + l.model).toLowerCase();
        if (titleLower.includes("shooting brake") || titleLower.includes("kombi") || titleLower.includes("touring") || titleLower.includes("variant") || titleLower.includes("avant") || titleLower.includes("estate") || titleLower.includes("sportback")) bodySlug = "combi";
        else if (titleLower.includes("cabrio") || titleLower.includes("roadster") || titleLower.includes("cabriolet") || titleLower.includes("spider") || titleLower.includes("spyder")) bodySlug = "kabriolet";
        else if (titleLower.includes("coupé") || titleLower.includes("coupe")) bodySlug = "coupe";
        else if (titleLower.includes("limousine") || titleLower.includes("sedan") || titleLower.includes("berlina")) bodySlug = "sedan";
        else if (titleLower.includes("suv") || titleLower.includes("pickup")) bodySlug = "suv";
        else if (titleLower.includes("van") || titleLower.includes("kleinbus")) bodySlug = "van";
      }

      let year = "";
      if (l.year) {
        const ym = l.year.match(/(\d{4})/);
        if (ym) year = ym[1];
      }

      let mileageNum = 0;
      if (l.mileage) {
        const cleaned = l.mileage.replace(/[.\s]/g, "").replace(/,/g, "");
        const mm = cleaned.match(/(\d+)/);
        if (mm) mileageNum = parseInt(mm[1], 10);
      }

      let path = `https://www.otomoto.pl/osobowe/${makeSlug}`;
      if (modelSlug) path += `/${modelSlug}`;
      if (bodySlug) path += `/seg-${bodySlug}`;
      if (year) path += `/od-${year}`;

      const params = new URLSearchParams();
      if (year) params.set("search[filter_float_year:from]", year);
      const fuelVal = fuelMap[l.fuel_type];
      if (fuelVal) params.set("search[filter_enum_fuel_type]", fuelVal);
      if (mileageNum > 0) {
        const from = Math.max(0, Math.round(mileageNum * 0.8 / 5000) * 5000);
        const to = Math.round(mileageNum * 1.2 / 5000) * 5000;
        params.set("search[filter_float_mileage:from]", String(from));
        params.set("search[filter_float_mileage:to]", String(to));
      }

      const qs = params.toString();
      return qs ? `${path}?${qs}` : path;
    },
  };
}
</script>

</body>
</html>
